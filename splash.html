<!doctype html>
<html lang="zh-CN">
<head>

.card{width:560px;padding:38px;border-radius:28px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);box-shadow:0 30px 80px rgba(0,0,0,.25)}
h1{font-size:42px;margin:0 0 12px 0}
p{font-size:17px;line-height:1.8;color:rgba(255,255,255,.9)}
.loader{margin-top:22px;height:8px;border-radius:99px;background:rgba(255,255,255,.20);overflow:hidden}
.loader div{width:42%;height:100%;background:#5eead4;border-radius:99px;animation:m 1.1s infinite ease-in-out}
@keyframes m{0%{margin-left:-42%}100%{margin-left:100%}}
.small{font-size:13px;color:rgba(255,255,255,.75);margin-top:18px}
</style>
</head>

  <div class="loader"><div></div></div>
  <div class="small">如果长时间无法打开，请检查网络连接，或联系 2790569814@qq.com。</div>
</div>
</body>
</html>
